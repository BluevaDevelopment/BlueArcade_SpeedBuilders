description:
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  - "<aqua>Game</aqua> <gray>-</gray> <light_purple><bold>Speed Builders</bold></light_purple>"
  - " "
  - "<white>Description:</white>"
  - "<gray>Memorize the build, then replicate it</gray>"
  - "<gray>as fast as possible to survive each round.</gray>"
  - " "
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

vote_menu:
