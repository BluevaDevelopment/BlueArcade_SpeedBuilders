setup_messages:
  structure:
    usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders structure <create|remove|list></yellow>"
    create:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders structure create <id></yellow>"
      must_use_stick: "<red>Select two corners with the setup tool first.</red>"
      saved: "<green>Structure '{id}' saved with {voxels} voxels.</green>"
    remove:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders structure remove <id></yellow>"
      not_found: "<red>That structure does not exist.</red>"
      success: "<green>Structure '{id}' has been removed.</green>"
    list:
      empty: "<gray>No structures found.</gray>"
      header: "<green>Available structures:</green>"
  plot:
    usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders plot <add|set|remove|spawn|build_area></yellow>"
    invalid_id: "<red>Invalid plot ID.</red>"
    not_found: "<red>That plot does not exist.</red>"
    add:
      must_use_stick: "<red>Select two corners with the setup tool first.</red>"
      set: "<green>Plot {index} region saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
      spawn_set: "<gray>Plot spawn set to your current location. Change it with</gray> <yellow>/baa game <id> speed_builders plot spawn set {index}</yellow>"
    set:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders plot set <plot_id></yellow>"
      success: "<green>Plot {index} region updated.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    remove:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders plot remove <plot_id></yellow>"
      success: "<green>Plot {index} has been removed.</green>"
    spawn:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders plot spawn set <plot_id></yellow>"
      set: "<green>Plot {index} spawn updated to your current location.</green>"
    build_area:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders plot build_area <set|remove> <plot_id></yellow>"
      set: "<green>Build area for plot {index} saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray> <gray>Floor:</gray> <yellow>{floor}</yellow>"
      remove: "<green>Build area for plot {index} has been removed.</green>"
  build_area:
    usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders build_area <add|set|remove></yellow>"
    invalid_id: "<red>Invalid build area ID.</red>"
    not_found: "<red>That build area does not exist.</red>"
    add:
      must_use_stick: "<red>Select two corners with the setup tool first.</red>"
      too_shallow: "<red>Build area is too shallow. The selection must include at least 1 floor layer and 1 build layer.</red>"
      below_recommended_size: "<yellow>Warning:</yellow> <gray>This build area is</gray> <white>{x}x{y}x{z}</white><gray>. Recommended size for default structures is</gray> <white>{recommended_x}x{recommended_y}x{recommended_z}</white><gray>; larger structures will be skipped unless you add custom structures.</gray>"
      no_floor: "<red>No build area floor detected. The lowest layer must contain blocks.</red>"
      too_many_floor_layers: "<red>Too many build area floor layers. Floor must be 1-2 blocks thick.</red>"
      set: "<green>Build area {index} saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray> <gray>Floor:</gray> <yellow>{floor}</yellow>"
      requires_plot_first: "<red>You must add a plot first before adding a build area.</red>"
      outside_plot: "<red>Build area must be fully inside its corresponding plot.</red>"
    set:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders build_area set <area_id></yellow>"
      success: "<green>Build area {index} updated.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray> <gray>Floor:</gray> <yellow>{floor}</yellow>"
    remove:
      usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders build_area remove <area_id></yellow>"
      success: "<green>Build area {index} has been removed.</green>"
  showcase:
    usage: "<red>Usage:</red> <yellow>/baa game <id> speed_builders showcase <set|remove></yellow>"
    set:
      must_use_stick: "<red>Select two corners with the setup tool first.</red>"
      too_shallow: "<red>Showcase is too shallow. The selection must be at least 10 blocks high.</red>"
      success: "<green>Showcase saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    remove:
      success: "<green>Showcase has been removed.</green>"
